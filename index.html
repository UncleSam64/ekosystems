<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hola Ale!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --accent: #e8c97e;
      --text: #f0ece0;
      --muted: rgba(240,236,224,0.35);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,201,126,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(4rem, 14vw, 10rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.5s;
    }

    h1 span {
      color: var(--accent);
      display: inline-block;
      position: relative;
    }

    /* Underline decoration on the name */
    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      width: 0;
      height: 3px;
      background: var(--accent);
      animation: lineGrow 0.7s ease forwards 1.4s;
    }

    @keyframes lineGrow {
      to { width: 100%; }
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    .sub {
      font-weight: 300;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <p class="eyebrow">bienvenida a tu web</p>
    <h1>Hola <span>Ale!</span></h1>
    <div class="divider"></div>
    <p class="sub">tu dominio, tus reglas ✦</p>
  </div>
</body>
</html>
